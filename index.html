<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeStream Football Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .video-placeholder {
            background-color: #212529;
            color: #fff;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-vimeo me-2 text-success"></i>
                <strong>VibeStream Football Hub</strong>
            </a>
            <span class="navbar-text text-white-50 d-none d-md-block">
                Good Vibes Football Live
            </span>
        </div>
    </nav>

    <div class="container">
        <div class="alert alert-success alert-dismissible fade show shadow-sm text-center mb-4" role="alert">
            <i class="bi bi-info-circle-fill me-2"></i>
            iPhone camera use garnuhos, sathi haru add garnuhos ra live score ko moj lenuhoso!
            <button type="button" class="btn-close" data-裁dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white border-bottom-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0 fw-bold">
                            <i class="bi bi-camera-video me-2 text-primary"></i>Camera Stream
                        </h5>
                        <span class="badge bg-warning text-dark px-3 py-2 rounded-pill fw-semibold" id="cameraStatus">
                            <i class="bi bi-hourglass-split me-1"></i> Status: Waiting
                        </span>
                    </div>
                    
                    <div class="card-body px-4 pb-4">
                        <div class="video-placeholder shadow-inner mb-3 position-relative">
                            <div class="text-center p-3">
                                <i class="bi bi-camera-video-off display-4 text-muted mb-2"></i>
                                <p class="mb-0 text-secondary">Camera is turned off</p>
                            </div>
                            </div>

                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                            <button class="btn btn-primary btn-lg px-4" id="btnTurnOn">
                                <i class="bi bi-camera-video-fill me-2"></i>Turn On Camera
                            </button>
                            <button class="btn btn-outline-danger btn-lg px-4" id="btnTurnOff">
                                <i class="bi bi-camera-video-off-fill me-2"></i>Turn Off
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white border-bottom-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0 fw-bold">
                            <i class="bi bi-trophy text-warning me-2"></i>Match Feed
                        </h5>
                        <button class="btn btn-light btn-sm border" id="btnRefresh">
                            <i class="bi bi-arrow-clockwise me-1"></i>Refresh
                        </button>
                    </div>

                    <div class="card-body px-4 pb-4 d-flex flex-column justify-content-between">
                        <div class="bg-light rounded p-4 text-center border my-auto">
                            <div class="spinner-border text-success mb-3" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mb-0 fw-medium text-muted" id="syncStatus">Syncing engine...</p>
                        </div>

                        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    </body>
</html>
