<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-User Football Live Stream & Scores</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #1a1a1a; color: #fff; }
        header { background-color: #111; padding: 20px; text-align: center; border-bottom: 3px solid #2ecc71; }
        h1 { margin: 0; color: #2ecc71; }
        p { margin: 5px 0 0 0; color: #aaa; }
        .container { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; max-width: 1400px; margin: 0 auto; }
        
        /* 1. Multi-Video Stream Section */
        .video-section { flex: 2; min-width: 450px; background: #222; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .control-panel { margin-bottom: 15px; background: #2a2a2a; padding: 10px; border-radius: 6px; display: flex; gap: 10px; align-items: center; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; background: #000; min-height: 400px; border-radius: 6px; padding: 15px; box-sizing: border-box; align-content: start; }
        .video-player { width: 100%; height: 180px; background: #333; border-radius: 6px; overflow: hidden; position: relative; border: 2px solid #444; }
        .video-player video { object-fit: cover !important; }
        .user-tag { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px; font-size: 12px; z-index: 10; }

        /* 2. Live Scores Section */
        .score-section { flex: 1; min-width: 320px; background: #222; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); height: 630px; overflow-y: auto; }
        .score-title { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px; }
        
        /* Buttons & Cards UI */
        button { color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-join { background: #2ecc71; }
        .btn-join:hover { background: #27ae60; }
        .btn-leave { background: #e74c3c; }
        .btn-leave:hover { background: #c0392b; }
        .refresh-btn { background: #34495e; font-size: 12px; padding: 5px 10px; }
        
        .match-card { background: #333; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 4px solid #2ecc71; display: flex; justify-content: space-between; align-items: center; }
        .teams { flex: 2; }
        .team-name { font-weight: bold; margin: 4px 0; font-size: 14px; }
        .scores { flex: 1; text-align: right; font-size: 18px; font-weight: bold; color: #f1c40f; }
        .match-status { font-size: 11px; background: #444; padding: 2px 6px; border-radius: 10px; color: #ccc; display: inline-block; margin-bottom: 5px; }
        .status-live { background: #e74c3c; color: white; animation: blink 1.5s infinite; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>Live Football Crew & Scores</h1>
        <p>Sabbai jana mobile bata add vayera sangai football match ko hisabkitab herne thau</p>
    </header>

    <div class="container">
        <div class="video-section">
            <div class="control-panel">
                <button id="join-btn" class="btn-join" onclick="joinStream()">🔴 Join Stream (Cam On)</button>
                <button id="leave-btn" class="btn-leave" onclick="leaveStream()" disabled>Leave</button>
                <span id="stream-status" style="color: #aaa; font-size: 13px; margin-left: auto;">Status: Disconnected</span>
            </div>
            
            <div id="video-grid" class="video-grid">
                </div>
        </div>

        <div class="score-section">
            <div class="score-title">
                <h2>🏆 Live Match Scores</h2>
                <button class="refresh-btn" onclick="fetchScores()">Refresh</button>
            </div>
            <div id="api-status" style="color: #f1c40f; font-size: 12px; margin-bottom: 10px;">API Loading...</div>
            <div id="match-list"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ CONFIGURATION SETTINGS (HALNUHOS)
        // ==========================================
        const FOOTBALL_API_KEY = "YOUR_FOOTBALL_DATA_API_KEY_HERE"; // https://www.football-data.org/
        const AGORA_APP_ID = "YOUR_AGORA_APP_ID_HERE";             // https://www.agora.io/
        
        const FOOTBALL_API_URL = "https://api.football-data.org/v4/matches";
        const AGORA_CHANNEL = "football_room";

        // ==========================================
        // 🔴 MULTI-USER VIDEO STREAM LOGIC (AGORA Engine)
        // ==========================================
        let agoraClient = null;
        let localTracks = { videoTrack: null, audioTrack: null };
        let remoteUsers = {};

        async function initAgora() {
            agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
            
            // Listen when a remote user (friend from mobile) opens their camera
            agoraClient.on("user-published", handleUserPublished);
            agoraClient.on("user-unpublished", handleUserUnpublished);
        }

        async function joinStream() {
            if (AGORA_APP_ID === "YOUR_AGORA_APP_ID_HERE") {
                alert("Please add your Agora App ID inside the script to use multi-user cameras!");
                createLocalPlaceholder();
                return;
            }

            try {
                if(!agoraClient) await initAgora();
                
                document.getElementById("stream-status").innerText = "Connecting...";
                
                // Join the video channel room (Using Token as null for easy testing in development)
                const uid = await agoraClient.join(AGORA_APP_ID, AGORA_CHANNEL, null, null);
                
                // Create local audio and camera tracks from your device
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({
                    encoderConfig: { width: 640, height: 480, frameRate: 24 }
                });

                // Display your camera on your own layout screen
                const localPlayer = document.createElement("div");
                localPlayer.id = `user-${uid}`;
                localPlayer.className = "video-player";
                localPlayer.innerHTML = `<div class="user-tag">You (Host)</div>`;
                document.getElementById("video-grid").appendChild(localPlayer);
                
                localTracks.videoTrack.play(localPlayer);

                // Publish audio & video so everyone in the room can see you
                await agoraClient.publish([localTracks.audioTrack, localTracks.videoTrack]);

                document.getElementById("stream-status").innerText = "🟢 Connected to Room";
                document.getElementById("join-btn").disabled = true;
                document.getElementById("leave-btn").disabled = false;

            } catch (err) {
                console.error(err);
                document.getElementById("stream-status").innerText = "❌ Connection Failed";
            }
        }

        async function handleUserPublished(user, mediaType) {
            const id = user.uid;
            remoteUsers[id] = user;
            await agoraClient.subscribe(user, mediaType);

            if (mediaType === "video") {
                // Remove existing element if it got duplicated
                const existingPlayer = document.getElementById(`user-${id}`);
                if (existingPlayer) existingPlayer.remove();

                // Create a new grid item box for your friend's mobile camera
                const remotePlayer = document.createElement("div");
                remotePlayer.id = `user-${id}`;
                remotePlayer.className = "video-player";
                remotePlayer.innerHTML = `<div class="user-tag">Guest ${id}</div>`;
                document.getElementById("video-grid").appendChild(remotePlayer);

                user.videoTrack.play(remotePlayer);
            }

            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        }

        function handleUserUnpublished(user) {
            const id = user.uid;
            delete remoteUsers[id];
            const playerTrack = document.getElementById(`user-${id}`);
            if (playerTrack) playerTrack.remove();
        }

        async function leaveStream() {
            // Stop and close local hardware feeds
            if(localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); }
            if(localTracks.audioTrack) { localTracks.audioTrack.stop(); localTracks.audioTrack.close(); }
            
            // Leave Agora server channel
            if(agoraClient) await agoraClient.leave();

            remoteUsers = {};
            document.getElementById("video-grid").innerHTML = "";
            document.getElementById("stream-status").innerText = "Status: Disconnected";
            document.getElementById("join-btn").disabled = false;
            document.getElementById("leave-btn").disabled = true;
        }

        function createLocalPlaceholder() {
            // Fallback demo for camera display if App ID is not setup yet
            const grid = document.getElementById("video-grid");
            if(document.getElementById("demo-user")) return;
            const demoBox = document.createElement("div");
            demoBox.id = "demo-user";
            demoBox.className = "video-player";
            demoBox.innerHTML = `<div class="user-tag">Demo User (API Key Missing)</div><div style="text-align:center; margin-top:80px; color:#555;">Camera Feed Area</div>`;
            grid.appendChild(demoBox);
        }

        // ==========================================
        // ⚽ FOOTBALL REAL-TIME SCORES LOGIC (API)
        // ==========================================
        async function fetchScores() {
            const statusDiv = document.getElementById('api-status');
            
            if (FOOTBALL_API_KEY === "YOUR_FOOTBALL_DATA_API_KEY_HERE") {
                statusDiv.innerHTML = "⚠️ Using Offline Demo Data. Set Football API Key!";
                showMockData();
                return;
            }

            statusDiv.innerHTML = "Fetching latest matches...";

            try {
                const response = await fetch(FOOTBALL_API_URL, {
                    headers: { 'X-Auth-Token': FOOTBALL_API_KEY }
                });
                
                if (!response.ok) throw new Error("API Connection Error");
                
                const data = await response.json();
                statusDiv.innerHTML = "🔄 Auto-Synced: " + new Date().toLocaleTimeString();
                displayMatches(data.matches);
            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = "❌ Failed to update. Running offline dataset.";
                showMockData();
            }
        }

        function displayMatches(matches) {
            const matchList = document.getElementById('match-list');
            matchList.innerHTML = "";

            if (!matches || matches.length === 0) {
                matchList.innerHTML = "<p style='text-align:center; padding:20px; color:#888;'>No matches scheduled for today.</p>";
                return;
            }

            matches.slice(0, 15).forEach(match => {
                const isLive = match.status === "IN_PLAY" || match.status === "PAUSED";
                const statusClass = isLive ? "match-status status-live" : "match-status";
                const statusText = isLive ? "🔴 LIVE" : match.status;

                const card = `
                    <div class="match-card">
                        <div class="teams">
                            <span class="${statusClass}">${statusText}</span>
                            <div class="team-name">⚽ ${match.homeTeam.name}</div>
                            <div class="team-name">⚽ ${match.awayTeam.name}</div>
                        </div>
                        <div class="scores">
                            <div>${match.score.fullTime.home !== null ? match.score.fullTime.home : 0}</div>
                            <div>${match.score.fullTime.away !== null ? match.score.fullTime.away : 0}</div>
                        </div>
                    </div>
                `;
                matchList.innerHTML += card;
            });
        }

        function showMockData() {
            const demoMatches = [
                { status: "IN_PLAY", homeTeam: { name: "Mexico 🇲🇽" }, awayTeam: { name: "South Africa 🇿🇦" }, score: { fullTime: { home: 1, away: 0 } } },
                { status: "TIMED", homeTeam: { name: "Japan 🇯🇵" }, awayTeam: { name: "Netherlands 🇳🇱" }, score: { fullTime: { home: 0, away: 0 } } },
                { status: "FINISHED", homeTeam: { name: "South Korea 🇰🇷" }, awayTeam: { name: "Czech Republic 🇨🇿" }, score: { fullTime: { home: 2, away: 1 } } }
            ];
            displayMatches(demoMatches);
        }

        // Initialize execution setup
        fetchScores();
        setInterval(fetchScores, 60000); // Check football api updates every 60 seconds
    </script>
</body>
</html>
